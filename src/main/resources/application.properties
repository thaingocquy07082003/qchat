spring.application.name=qchat

# ===================== DATASOURCE =====================
spring.datasource.url=jdbc:postgresql://localhost:5434/chatdb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===================== JPA / HIBERNATE =====================
# Flyway manages the schema — Hibernate must NOT touch the DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===================== FLYWAY =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ===================== REDIS =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# ===================== JWT =====================
jwt.access-token-secret=change-this-to-a-256bit-random-secret-at-least-32-characters-long!!
jwt.refresh-token-secret=another-256bit-random-secret-for-refresh-tokens-keep-it-different!!
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=2592000000

# ===================== OAUTH2 — Google =====================
spring.security.oauth2.client.registration.google.client-id=512671457518-folo0ola8c0kjjhavmridk3gr7adu7cu.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=512671457518-folo0ola8c0kjjhavmridk3gr7adu7cu.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

# ===================== APP — OAuth2 redirect =====================
# Frontend URL that receives the tokens after OAuth2 login
app.oauth2.authorized-redirect-uri=http://localhost:3000/oauth2/callback

# ===================== JACKSON =====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================== WEBSOCKET =====================
spring.websocket.path=/ws

# ===================== FILE UPLOAD =====================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ===================== ACTUATOR =====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
